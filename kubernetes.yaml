apiVersion: v1
kind: Namespace
metadata:
  name: dponce

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: dponce
data:
  USER_KEY: "usuario123"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: dponce
type: Opaque
data:
  BD_PASSWORD: cGFzc3dvcmQxMjM=   # "password123" en base64

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curso-devops-lab3
  namespace: dponce
spec:
  replicas: 3
  selector:
    matchLabels:
      app: curso-devops-lab3
  template:
    metadata:
      labels:
        app: curso-devops-lab3
    spec:
      containers:
      - name: curso-devops-lab3
        image: docker.pkg.github.com/tuorg/curso-devops-lab3:latest
        ports:
        - containerPort: 8080
        env:
        - name: USER_KEY
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: USER_KEY
        - name: BD_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: BD_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: curso-devops-lab3-service
  namespace: dponce
spec:
  selector:
    app: curso-devops-lab3
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer